version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "${PORT:-5000}"
    environment:
      TZ: America/Sao_Paulo
      PYTHONPATH: /transcreve-api/venv
      PORT: ${PORT:-5000}
      ALLOWED_IPS: ${ALLOWED_IPS:-}
      MAX_CONTENT_LENGTH_MB: ${MAX_CONTENT_LENGTH_MB:-50}
    volumes:
      - uploads:/transcreve-api/uploads
      - logs:/transcreve-api/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:$${PORT:-5000}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

volumes:
  uploads:
  logs:
