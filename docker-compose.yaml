version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "${PORT:-5000}"
    environment:
      TZ: America/Sao_Paulo
      PYTHONPATH: /transcreve-api/venv
      PORT: ${PORT:-5000}
      ALLOWED_IPS: ${ALLOWED_IPS:-}
      MAX_CONTENT_LENGTH_MB: ${MAX_CONTENT_LENGTH_MB:-2048}
      WORKERS: ${WORKERS:-16}
      THREADS: ${THREADS:-2}
      TIMEOUT: ${TIMEOUT:-3600}
      GRACEFUL_TIMEOUT: ${GRACEFUL_TIMEOUT:-300}
      KEEP_ALIVE: ${KEEP_ALIVE:-5}
      MAX_REQUESTS: ${MAX_REQUESTS:-1000}
      MAX_REQUESTS_JITTER: ${MAX_REQUESTS_JITTER:-100}
    volumes:
      - uploads:/transcreve-api/uploads
      - logs:/transcreve-api/logs
    tmpfs:
      - /tmp:size=${TMPFS_SIZE:-8G},mode=1777
    shm_size: ${SHM_SIZE:-2G}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:$${PORT:-5000}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-48G}
        reservations:
          memory: ${MEMORY_RESERVATION:-16G}

volumes:
  uploads:
  logs:
